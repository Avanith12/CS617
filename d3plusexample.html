<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>% Change from F17</title>
  <script src="https://cdn.jsdelivr.net/npm/@d3plus/core"></script>
</head>
<body>
  <div id="viz" style="height:540px;"></div>
  <script>
    const data = [
      {id:"Students", x:"F17", y:0},
      {id:"Students", x:"Sp18", y:-7.37},
      {id:"Students", x:"F18", y:5.53},
      {id:"Students", x:"Sp19", y:-3.96},
      {id:"Students", x:"F19", y:7.93},
      {id:"Students", x:"Sp20", y:0.37},
      {id:"Students", x:"F20", y:9.86},
      {id:"Students", x:"Sp21", y:2.67},
      {id:"Students", x:"F21", y:14.01},
      {id:"Students", x:"Sp22", y:10.05},
      {id:"Students", x:"F22", y:37.33},
      {id:"Students", x:"Sp23", y:25.25},

      {id:"Faculty", x:"F17", y:0},
      {id:"Faculty", x:"Sp18", y:4.55},
      {id:"Faculty", x:"F18", y:4.55},
      {id:"Faculty", x:"Sp19", y:4.55},
      {id:"Faculty", x:"F19", y:9.09},
      {id:"Faculty", x:"Sp20", y:9.09},
      {id:"Faculty", x:"F20", y:9.09},
      {id:"Faculty", x:"Sp21", y:18.18},
      {id:"Faculty", x:"F21", y:13.64},
      {id:"Faculty", x:"Sp22", y:9.09},
      {id:"Faculty", x:"F22", y:4.55},
      {id:"Faculty", x:"Sp23", y:9.09}
    ];

    new d3plus.LinePlot()
      .select("#viz")
      .config({
        data,
        groupBy: "id",
        x: "x",
        y: "y",
        title: "% Change in CS Students vs. CS Faculty (From F17 to Sp23)",
        xConfig: { title: "Semester" },
        yConfig: { title: "% Change from F17" },
        shapeConfig: {
          strokeWidth: 3,
          Line: { curve: "linear" }
        }
      })
      .render();
  </script>
</body>
</html>
